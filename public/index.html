<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prestige - Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Montserrat', sans-serif; background: #0a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .chat-container { width: 400px; height: 620px; background: #111; border: 1px solid #2a2a2a; display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { background: #0a0a0a; padding: 20px 24px; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; gap: 14px; }
    .header-logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; color: #c9a96e; letter-spacing: 3px; text-transform: uppercase; }
    .header-sub { font-size: 10px; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
    .status { margin-left: auto; display: flex; align-items: center; gap: 6px; }
    .dot { width: 6px; height: 6px; background: #c9a96e; border-radius: 50%; animation: pulse 2s infinite; }
    .status-text { font-size: 10px; color: #555; letter-spacing: 1px; text-transform: uppercase; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; scrollbar-width: thin; scrollbar-color: #2a2a2a #111; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: #111; }
    .messages::-webkit-scrollbar-thumb { background: #2a2a2a; }
    .msg { max-width: 82%; font-size: 13px; line-height: 1.7; letter-spacing: 0.3px; }
    .msg.bot { color: #ccc; align-self: flex-start; padding: 14px 16px; background: #1a1a1a; border-left: 2px solid #c9a96e; }
    .msg.user { color: #0a0a0a; align-self: flex-end; padding: 14px 16px; background: #c9a96e; }
    .msg a { color: #c9a96e; text-decoration: none; border-bottom: 1px solid #c9a96e44; }
    .msg.user a { color: #0a0a0a; border-bottom-color: #0a0a0a44; }
    .typing { display: flex; gap: 5px; padding: 14px 16px; background: #1a1a1a; border-left: 2px solid #c9a96e; align-self: flex-start; }
    .typing span { width: 5px; height: 5px; background: #c9a96e; border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
    .quick-replies { padding: 0 24px 16px; display: flex; gap: 8px; flex-wrap: wrap; }
    .qr-btn { background: transparent; border: 1px solid #2a2a2a; color: #888; padding: 7px 14px; font-family: 'Montserrat', sans-serif; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all .2s; }
    .qr-btn:hover { border-color: #c9a96e; color: #c9a96e; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 6px; align-self: flex-start; max-width: 90%; }
    .sug-btn { background: transparent; border: 1px solid #c9a96e44; color: #c9a96e; padding: 6px 12px; font-family: 'Montserrat', sans-serif; font-size: 11px; letter-spacing: 0.5px; cursor: pointer; transition: all .2s; }
    .sug-btn:hover { background: #c9a96e22; border-color: #c9a96e; }
    .input-area { padding: 16px 24px; border-top: 1px solid #2a2a2a; display: flex; gap: 12px; align-items: center; background: #0a0a0a; }
    #userInput { flex: 1; background: transparent; border: none; border-bottom: 1px solid #2a2a2a; color: #ccc; font-family: 'Montserrat', sans-serif; font-size: 13px; padding: 8px 0; outline: none; letter-spacing: 0.3px; transition: border .2s; }
    #userInput::placeholder { color: #444; }
    #userInput:focus { border-bottom-color: #c9a96e; }
    #sendBtn { background: transparent; border: 1px solid #2a2a2a; color: #c9a96e; width: 36px; height: 36px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all .2s; flex-shrink: 0; }
    #sendBtn:hover { background: #c9a96e; color: #0a0a0a; border-color: #c9a96e; }
  </style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div>
      <div class="header-logo">Prestige</div>
      <div class="header-sub">Salon de Coiffure · Albertville</div>
    </div>
    <div class="status">
      <div class="dot"></div>
      <span class="status-text">En ligne</span>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="quick-replies" id="quickReplies">
    <button class="qr-btn" onclick="sendQuick('Quels sont vos horaires ?')">Horaires</button>
    <button class="qr-btn" onclick="sendQuick('Quels sont vos services ?')">Services</button>
    <button class="qr-btn" onclick="sendQuick('Je veux prendre rendez-vous')">Réserver</button>
  </div>
  <div class="input-area">
    <input id="userInput" type="text" placeholder="Votre message..." />
    <button id="sendBtn" onclick="sendMessage()">→</button>
  </div>
</div>
<script>
  const API_URL = window.location.origin;
  const SESSION_ID = 'session_' + Math.random().toString(36).substr(2, 9);
  const WELCOME = "Bonjour ! Bienvenue chez Prestige ✂️ Salon de coiffure à Albertville depuis 1942. Comment puis-je vous aider ?";

  window.onload = () => {
    addMessage(WELCOME, 'bot');
    document.getElementById('userInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });
  };

  function linkify(text) {
    return text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">→ Prendre RDV</a>');
  }

  function getSuggestions(text) {
    const t = text.toLowerCase();
    if (t.includes('service') || t.includes('prestation') || t.includes('intéresse')) {
      return ['Coupe femme', 'Coupe homme', 'Balayage', 'Coloration', 'Lissage brésilien'];
    }
    if (t.includes('rdv') || t.includes('rendez-vous') || t.includes('réserver') || t.includes('planity')) {
      return ['Prendre RDV maintenant', 'Quels sont vos horaires ?'];
    }
    if (t.includes('horaire') || t.includes('ouvert')) {
      return ['Quels sont vos services ?', 'Je veux prendre rendez-vous'];
    }
    if (t.includes('prix') || t.includes('tarif') || t.includes('€')) {
      return ['Je veux prendre rendez-vous', 'Autres services'];
    }
    return ['Je veux prendre rendez-vous', 'Autres questions'];
  }

  function addMessage(text, type) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.innerHTML = linkify(text);
    msgs.appendChild(div);
    if (type === 'bot') {
      const suggestions = getSuggestions(text);
      if (suggestions.length > 0) {
        const sugDiv = document.createElement('div');
        sugDiv.className = 'suggestions';
        suggestions.forEach(s => {
          const btn = document.createElement('button');
          btn.className = 'sug-btn';
          btn.textContent = s;
          btn.onclick = () => {
            document.querySelectorAll('.suggestions').forEach(el => el.remove());
            document.getElementById('userInput').value = s;
            sendMessage();
          };
          sugDiv.appendChild(btn);
        });
        msgs.appendChild(sugDiv);
      }
    }
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'typing'; div.id = 'typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;
    document.getElementById('quickReplies').style.display = 'none';
    addMessage(text, 'user');
    input.value = '';
    showTyping();
    try {
      const res = await fetch(`${API_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, sessionId: SESSION_ID })
      });
      const data = await res.json();
      hideTyping();
      addMessage(data.reply, 'bot');
    } catch {
      hideTyping();
      addMessage("Désolé, problème de connexion. Appelez-nous au 07 55 55 10 00", 'bot');
    }
  }

  function sendQuick(text) {
    document.getElementById('userInput').value = text;
    sendMessage();
  }
</script>
</body>
</html>
